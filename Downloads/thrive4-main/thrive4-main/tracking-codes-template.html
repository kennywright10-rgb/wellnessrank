<!-- ===================================================================
     CONVERSION TRACKING SCRIPTS
     Add these to your main.js file or inline
     ==================================================================== -->

<script>
// Phone Call Tracking
function trackPhoneCall() {
  // Google Analytics
  if (typeof gtag !== 'undefined') {
    gtag('event', 'phone_call', {
      'event_category': 'engagement',
      'event_label': 'header_phone',
      'value': 1
    });
  }
  
  // Meta Pixel
  if (typeof fbq !== 'undefined') {
    fbq('track', 'Contact');
  }
  
  // Google Tag Manager (if using GTM)
  if (typeof dataLayer !== 'undefined') {
    dataLayer.push({
      'event': 'phone_call',
      'call_location': 'header'
    });
  }
}

// Form Submission Tracking
function trackFormSubmit(formName) {
  // Google Analytics
  if (typeof gtag !== 'undefined') {
    gtag('event', 'form_submit', {
      'event_category': 'engagement',
      'event_label': formName,
      'value': 1
    });
  }
  
  // Meta Pixel
  if (typeof fbq !== 'undefined') {
    fbq('track', 'Lead');
  }
  
  // Google Tag Manager
  if (typeof dataLayer !== 'undefined') {
    dataLayer.push({
      'event': 'form_submission',
      'form_name': formName
    });
  }
}

// Book Appointment Tracking
function trackAppointment() {
  // Google Analytics
  if (typeof gtag !== 'undefined') {
    gtag('event', 'book_appointment', {
      'event_category': 'conversion',
      'event_label': 'appointment_form',
      'value': 1
    });
  }
  
  // Meta Pixel
  if (typeof fbq !== 'undefined') {
    fbq('track', 'Schedule');
  }
  
  // Google Tag Manager
  if (typeof dataLayer !== 'undefined') {
    dataLayer.push({
      'event': 'appointment_booked',
      'booking_type': 'online_form'
    });
  }
}

// Newsletter Signup Tracking
function trackNewsletterSignup() {
  // Google Analytics
  if (typeof gtag !== 'undefined') {
    gtag('event', 'newsletter_signup', {
      'event_category': 'engagement',
      'event_label': 'footer_newsletter'
    });
  }
  
  // Meta Pixel
  if (typeof fbq !== 'undefined') {
    fbq('track', 'Lead');
  }
  
  // Google Tag Manager
  if (typeof dataLayer !== 'undefined') {
    dataLayer.push({
      'event': 'newsletter_signup',
      'signup_location': 'footer'
    });
  }
}

// Service Page View Tracking
function trackServiceView(serviceName) {
  // Google Analytics
  if (typeof gtag !== 'undefined') {
    gtag('event', 'view_item', {
      'event_category': 'engagement',
      'event_label': serviceName,
      'items': [{
        'item_name': serviceName,
        'item_category': 'service'
      }]
    });
  }
  
  // Meta Pixel
  if (typeof fbq !== 'undefined') {
    fbq('track', 'ViewContent', {
      content_name: serviceName,
      content_category: 'service'
    });
  }
}
</script>
